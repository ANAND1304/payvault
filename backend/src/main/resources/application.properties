server.port=8080
spring.application.name=payvault

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/payvault_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Your Password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
payvault.jwt.secret=payvault-super-secret-key-change-this-in-production-must-be-256-bits-minimum
payvault.jwt.expiration=86400000

# CORS
payvault.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.payvault=DEBUG
logging.level.org.springframework.security=WARN

# Payment Simulation
payvault.payment.success-rate=0.85
payvault.payment.processing-delay-ms=2000
